<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2D3748">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SHOR">
    <title>SHOR - Sensor Humano de Operación Real</title>
    
    <!-- PWA Manifest embebido como data URI -->
    <link rel="manifest" href="data:application/json,{
        &quot;name&quot;: &quot;SHOR - Sensor Humano de Operaci%C3%B3n Real&quot;,
        &quot;short_name&quot;: &quot;SHOR&quot;,
        &quot;description&quot;: &quot;Bit%C3%A1cora de operaciones&quot;,
        &quot;start_url&quot;: &quot;.&quot;,
        &quot;display&quot;: &quot;standalone&quot;,
        &quot;background_color&quot;: &quot;%232D3748&quot;,
        &quot;theme_color&quot;: &quot;%232D3748&quot;,
        &quot;orientation&quot;: &quot;portrait&quot;,
        &quot;icons&quot;: [{
            &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%232D3748' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' text-anchor='middle' fill='white' font-size='40' font-family='Arial'%3ES%3C/text%3E%3C/svg%3E&quot;,
            &quot;sizes&quot;: &quot;192x192&quot;,
            &quot;type&quot;: &quot;image/svg+xml&quot;
        }]
    }">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #F7FAFC;
            min-height: 100vh;
            color: #1A202C;
        }
        
        .header {
            background: #2D3748;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .header-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .header-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .date-display {
            font-size: 16px;
            color: #718096;
            margin-bottom: 8px;
        }
        
        .persona-info {
            font-size: 14px;
            color: #A0AEC0;
        }
        
        .main-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #48BB78;
            color: white;
            font-size: 18px;
            padding: 20px;
        }
        
        .btn-secondary {
            background: #4299E1;
            color: white;
        }
        
        .btn-outline {
            background: white;
            color: #718096;
            border: 2px solid #E2E8F0;
        }
        
        .btn-recording {
            background: #E53E3E;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .registros-list {
            margin-top: 20px;
        }
        
        .registros-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .registro-item {
            background: #F7FAFC;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .registro-icon {
            font-size: 20px;
            min-width: 28px;
        }
        
        .registro-content {
            flex: 1;
        }
        
        .registro-text {
            font-size: 14px;
            color: #2D3748;
            margin-bottom: 4px;
        }
        
        .registro-time {
            font-size: 12px;
            color: #A0AEC0;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #1A202C;
        }
        
        .modal-subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 16px;
        }
        
        .modal textarea, .modal input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 16px;
            resize: none;
            font-family: inherit;
        }
        
        .modal textarea:focus, .modal input:focus {
            outline: none;
            border-color: #4299E1;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        /* Onboarding */
        .onboarding {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }
        
        .onboarding-logo {
            width: 80px;
            height: 80px;
            background: #2D3748;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 24px;
        }
        
        .onboarding h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1A202C;
        }
        
        .onboarding p {
            font-size: 16px;
            color: #718096;
            margin-bottom: 32px;
        }
        
        .onboarding input {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .onboarding select {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 24px;
            background: white;
        }
        
        /* Install banner */
        .install-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2D3748;
            color: white;
            padding: 16px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 150;
        }
        
        .install-banner.show {
            display: flex;
        }
        
        .install-banner p {
            font-size: 14px;
        }
        
        .install-banner .btn {
            padding: 10px 20px;
            font-size: 14px;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #A0AEC0;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Onboarding Screen -->
    <div id="onboarding" class="onboarding">
        <div class="onboarding-logo">S</div>
        <h1>SHOR</h1>
        <p>Sensor Humano de Operación Real</p>
        
        <input type="text" id="nombreInput" placeholder="Tu nombre" autocomplete="off">
        
        <select id="rolSelect">
            <option value="">Selecciona tu rol</option>
            <option value="Director">Director</option>
            <option value="Operativo">Operativo</option>
            <option value="Producción">Producción</option>
            <option value="Almacén">Almacén</option>
            <option value="Ventas">Ventas</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Mantenimiento">Mantenimiento</option>
            <option value="Doméstico">Doméstico</option>
        </select>
        
        <button class="btn btn-primary" onclick="iniciarApp()">Comenzar</button>
    </div>
    
    <!-- Main App -->
    <div id="app" style="display: none;">
        <header class="header">
            <h1 id="headerTitle">Hola, Usuario</h1>
            <div class="header-actions">
                <button class="header-btn" onclick="showExportModal()" title="Exportar">📤</button>
            </div>
        </header>
        
        <div class="container">
            <div class="card">
                <div class="date-display" id="dateDisplay"></div>
                <div class="persona-info" id="personaInfo"></div>
            </div>
            
            <div class="main-actions">
                <button class="btn btn-primary" id="recordBtn" onclick="toggleRecording()">
                    🎤 Grabar audio
                </button>
                
                <button class="btn btn-secondary" onclick="showTextModal()">
                    ✏️ Escribir nota
                </button>
                
                <button class="btn btn-outline" onclick="registrarSkip()">
                    ⏭️ Nada relevante hoy
                </button>
            </div>
            
            <div class="registros-list">
                <div class="registros-title">Registros de hoy</div>
                <div id="registrosList"></div>
            </div>
        </div>
    </div>
    
    <!-- Text Modal -->
    <div class="modal-overlay" id="textModal">
        <div class="modal">
            <h2>✏️ Escribe tu nota</h2>
            <p class="modal-subtitle">¿Qué pasó hoy que valga la pena recordar?</p>
            <textarea id="notaTextarea" rows="4" placeholder="Escribe aquí..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeTextModal()">Cancelar</button>
                <button class="btn btn-secondary" onclick="guardarNota()">Guardar</button>
            </div>
        </div>
    </div>
    
    <!-- Export Modal -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <h2>📤 Exportar reporte</h2>
            <p class="modal-subtitle">¿Qué opinas de la app hoy?</p>
            <textarea id="opinionTextarea" rows="2" placeholder="Ej: Fácil de usar, me gusta..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeExportModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="exportarReporte()">Exportar</button>
            </div>
        </div>
    </div>
    
    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
        <p>📱 Instalar SHOR como app</p>
        <button class="btn btn-primary" onclick="installApp()">Instalar</button>
    </div>
    
    <script>
        // ============================================
        // SHOR PWA - Sensor Humano de Operación Real
        // Versión: 1.0.0
        // Almacenamiento: IndexedDB local
        // ============================================
        
        let db;
        let persona = null;
        let registros = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let deferredPrompt = null;
        
        // ============================================
        // IndexedDB Setup
        // ============================================
        
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('SHOR_DB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    // Personas store
                    if (!database.objectStoreNames.contains('personas')) {
                        database.createObjectStore('personas', { keyPath: 'id' });
                    }
                    
                    // Registros store
                    if (!database.objectStoreNames.contains('registros')) {
                        const store = database.createObjectStore('registros', { keyPath: 'id' });
                        store.createIndex('fecha', 'fecha', { unique: false });
                        store.createIndex('personaId', 'personaId', { unique: false });
                    }
                    
                    // Reportes enviados store
                    if (!database.objectStoreNames.contains('reportes')) {
                        database.createObjectStore('reportes', { keyPath: 'id' });
                    }
                };
            });
        }
        
        // ============================================
        // DB Operations
        // ============================================
        
        function dbAdd(storeName, data) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        function dbGet(storeName, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        function dbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        // ============================================
        // App Logic
        // ============================================
        
        async function init() {
            await initDB();
            
            // Check if persona exists
            const personas = await dbGetAll('personas');
            if (personas.length > 0) {
                persona = personas[0];
                showApp();
            } else {
                document.getElementById('onboarding').style.display = 'flex';
            }
            
            // PWA install prompt
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installBanner').classList.add('show');
            });
        }
        
        async function iniciarApp() {
            const nombre = document.getElementById('nombreInput').value.trim();
            const rol = document.getElementById('rolSelect').value;
            
            if (!nombre || !rol) {
                alert('Por favor completa tu nombre y rol');
                return;
            }
            
            persona = {
                id: 'persona_' + Date.now(),
                nombre: nombre,
                rol: rol,
                createdAt: new Date().toISOString()
            };
            
            await dbAdd('personas', persona);
            showApp();
        }
        
        function showApp() {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            document.getElementById('headerTitle').textContent = `Hola, ${persona.nombre}`;
            document.getElementById('personaInfo').textContent = persona.rol;
            
            updateDateDisplay();
            loadRegistrosHoy();
        }
        
        function updateDateDisplay() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('es-MX', options);
            document.getElementById('dateDisplay').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }
        
        async function loadRegistrosHoy() {
            const allRegistros = await dbGetAll('registros');
            const hoy = new Date().toISOString().split('T')[0];
            registros = allRegistros.filter(r => r.fecha === hoy && r.personaId === persona.id);
            renderRegistros();
        }
        
        function renderRegistros() {
            const container = document.getElementById('registrosList');
            
            if (registros.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>Sin registros hoy</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = registros.map(r => {
                const icon = r.tipo === 'audio' ? '🎤' : r.tipo === 'texto' ? '✏️' : '⏭️';
                const time = new Date(r.timestamp).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="registro-item">
                        <div class="registro-icon">${icon}</div>
                        <div class="registro-content">
                            <div class="registro-text">${r.contenido || r.tipo}</div>
                            <div class="registro-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============================================
        // Recording
        // ============================================
        
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        await guardarRegistro('audio', 'Audio grabado', reader.result);
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                
                const btn = document.getElementById('recordBtn');
                btn.innerHTML = '⏹️ Detener grabación';
                btn.classList.add('btn-recording');
                
            } catch (err) {
                alert('No se pudo acceder al micrófono. Asegúrate de dar permisos.');
                console.error(err);
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                const btn = document.getElementById('recordBtn');
                btn.innerHTML = '🎤 Grabar audio';
                btn.classList.remove('btn-recording');
            }
        }
        
        // ============================================
        // Text Notes
        // ============================================
        
        function showTextModal() {
            document.getElementById('textModal').classList.add('active');
            document.getElementById('notaTextarea').focus();
        }
        
        function closeTextModal() {
            document.getElementById('textModal').classList.remove('active');
            document.getElementById('notaTextarea').value = '';
        }
        
        async function guardarNota() {
            const nota = document.getElementById('notaTextarea').value.trim();
            if (!nota) {
                alert('Escribe algo antes de guardar');
                return;
            }
            
            await guardarRegistro('texto', nota);
            closeTextModal();
        }
        
        async function registrarSkip() {
            await guardarRegistro('skip', 'Nada relevante hoy');
        }
        
        // ============================================
        // Save Record
        // ============================================
        
        async function guardarRegistro(tipo, contenido, audioData = null) {
            const registro = {
                id: 'reg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                personaId: persona.id,
                tipo: tipo,
                contenido: contenido,
                audioData: audioData,
                fecha: new Date().toISOString().split('T')[0],
                timestamp: new Date().toISOString()
            };
            
            await dbAdd('registros', registro);
            registros.push(registro);
            renderRegistros();
            
            // Vibrate for feedback
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
        
        // ============================================
        // Export
        // ============================================
        
        function showExportModal() {
            document.getElementById('exportModal').classList.add('active');
            document.getElementById('opinionTextarea').focus();
        }
        
        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
            document.getElementById('opinionTextarea').value = '';
        }
        
        async function exportarReporte() {
            const opinion = document.getElementById('opinionTextarea').value.trim();
            if (!opinion) {
                alert('Por favor escribe tu opinión de la app');
                return;
            }
            
            const allRegistros = await dbGetAll('registros');
            const allReportes = await dbGetAll('reportes');
            
            // Get last export date
            const lastExport = allReportes.length > 0 
                ? allReportes.sort((a, b) => new Date(b.fecha) - new Date(a.fecha))[0].fecha 
                : null;
            
            // Filter registros not yet exported
            let registrosParaExportar = allRegistros.filter(r => r.personaId === persona.id);
            if (lastExport) {
                registrosParaExportar = registrosParaExportar.filter(r => r.fecha > lastExport);
            }
            
            if (registrosParaExportar.length === 0) {
                alert('No hay registros nuevos para exportar');
                closeExportModal();
                return;
            }
            
            // Determine file name
            const fechas = registrosParaExportar.map(r => r.fecha).sort();
            const fechaInicio = fechas[0];
            const fechaFin = fechas[fechas.length - 1];
            
            const nombreArchivo = fechaInicio === fechaFin 
                ? `SHOR_${persona.nombre}_${fechaFin}.json`
                : `SHOR_${persona.nombre}_${fechaInicio}_a_${fechaFin}.json`;
            
            // Build export data
            const exportData = {
                shor_export: {
                    version: '1.0.0',
                    export_id: 'SHOR_' + new Date().toISOString().replace(/[:\-.]/g, ''),
                    export_date: new Date().toISOString(),
                    archivo_nombre: nombreArchivo,
                    periodo: {
                        desde: fechaInicio,
                        hasta: fechaFin
                    },
                    persona: {
                        id: persona.id,
                        nombre: persona.nombre,
                        rol: persona.rol
                    },
                    opinion_del_dia: opinion,
                    registros: registrosParaExportar.map(r => ({
                        id: r.id,
                        tipo: r.tipo,
                        contenido: r.contenido,
                        fecha: r.fecha,
                        timestamp: r.timestamp
                    })),
                    total_registros: registrosParaExportar.length,
                    check_reportes_anteriores: allReportes.map(r => ({
                        fecha: r.fecha,
                        opinion: r.opinion
                    })),
                    meta_flujo: {
                        ultimo_export: lastExport,
                        dias_sin_exportar: lastExport 
                            ? Math.floor((new Date() - new Date(lastExport)) / (1000 * 60 * 60 * 24))
                            : null,
                        observado_por: 'RUIDO',
                        tipo_nutriente: 'SHOR_EXPORT'
                    }
                }
            };
            
            // Save report record
            const reporteRecord = {
                id: 'rep_' + Date.now(),
                fecha: fechaFin,
                opinion: opinion,
                archivo: nombreArchivo,
                timestamp: new Date().toISOString()
            };
            await dbAdd('reportes', reporteRecord);
            
            // Generate JSON string
            const jsonStr = JSON.stringify(exportData, null, 2);
            
            // Share via WhatsApp or download
            const mensaje = `📋 SHOR Reporte: ${nombreArchivo}\n\n${jsonStr}`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `SHOR - ${persona.nombre}`,
                        text: mensaje
                    });
                } catch (err) {
                    // Fallback to WhatsApp
                    shareToWhatsApp(mensaje);
                }
            } else {
                shareToWhatsApp(mensaje);
            }
            
            closeExportModal();
            alert('Reporte exportado ✓');
        }
        
        function shareToWhatsApp(mensaje) {
            const encoded = encodeURIComponent(mensaje);
            window.open(`https://wa.me/?text=${encoded}`, '_blank');
        }
        
        // ============================================
        // PWA Install
        // ============================================
        
        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBanner').classList.remove('show');
                }
                deferredPrompt = null;
            }
        }
        
        // ============================================
        // Service Worker (inline registration)
        // ============================================
        
        if ('serviceWorker' in navigator) {
            // Create a minimal service worker blob for offline support
            const swCode = `
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', (e) => {
                    e.waitUntil(clients.claim());
                });
                self.addEventListener('fetch', (e) => {
                    // Let the browser handle all requests normally
                    return;
                });
            `;
            
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            
            // Note: This won't work for true offline as blob URLs don't persist
            // For full offline, the HTML file needs to be served from a server
            // But the app will still work as long as the HTML file is cached
        }
        
        // ============================================
        // Initialize
        // ============================================
        
        init();
    </script>
</body>
